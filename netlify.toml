[build]
  publish = "dist"

[[redirects]]
  from = "/product/*"
  to = "/product.html?id=:splat"
  status = 200

[[redirects]]
  from = "/signature-collection"
  to = "/crown-collection.html"
  status = 301

[[redirects]]
  from = "/collections"
  to = "/crown-collection.html"
  status = 301

[[redirects]]
  from = "/signature-collection.html"
  to = "/crown-collection.html"
  status = 301

[[redirects]]
  from = "/collections.html"
  to = "/crown-collection.html"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-XSS-Protection = "1; mode=block"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Cross-Origin-Resource-Policy = "same-origin"
    Cross-Origin-Opener-Policy = "same-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://www.googletagmanager.com https://www.google-analytics.com https://*.googleapis.com 'unsafe-inline' 'unsafe-eval'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' https://images.unsplash.com data:; media-src 'self'; connect-src 'self' https://www.google-analytics.com https://*.googleapis.com https://api.github.com; frame-src 'self' https://maps.google.com https://www.google.com; object-src 'none'; base-uri 'self'; form-action 'self'"
